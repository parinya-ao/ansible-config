---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# XDG User Directories Configuration
# =============================================================================
# STATE: XDG user directories must be in English
# Migrates localized directories (e.g., Thai "ดาวน์โหลด") to English equivalents
# =============================================================================

- name: "STATE: xdg-user-dirs-update must be installed"
  ansible.builtin.package:
    name: xdg-user-dirs
    state: present

- name: "GATHER: Get actual user home directory"
  ansible.builtin.command: "echo ~{{ ansible_user | default(lookup('env', 'USER')) }}"
  register: locale_user_home
  changed_when: false
  become: false

- name: "GATHER: Check current XDG directories configuration"
  ansible.builtin.slurp:
    src: "{{ locale_user_home.stdout }}/.config/user-dirs.dirs"
  register: locale_xdg_current_dirs
  changed_when: false
  become: false
  ignore_errors: true

- name: "GATHER: Display current XDG directories"
  ansible.builtin.debug:
    msg: "{{ (locale_xdg_current_dirs.content | b64decode).split('\n') if not locale_xdg_current_dirs.failed else 'No existing configuration' }}"

- name: "STATE: Check for localized directories in home"
  ansible.builtin.stat:
    path: "{{ locale_user_home.stdout }}/{{ item.name }}"
  register: locale_localized_dir_checks
  loop: "{{ locale_localized_dirs }}"
  become: false

- name: "STATE: Create target English directories if they do not exist"
  ansible.builtin.file:
    path: "{{ locale_user_home.stdout }}/{{ item.target }}"
    state: directory
    mode: "0755"
  loop: "{{ locale_localized_dirs }}"
  become: false

- name: "STATE: Move content from localized directories to English directories"
  ansible.builtin.command:
    cmd: >
      mv {{ locale_user_home.stdout }}/{{ item.item.name }}/* {{ locale_user_home.stdout }}/{{ item.item.target }}/
  loop: "{{ locale_localized_dir_checks.results }}"
  when: item.stat.exists
  register: locale_move_result
  failed_when:
    - locale_move_result.rc != 0
    - "'No such file or directory' not in locale_move_result.stderr"
  changed_when: locale_move_result.rc == 0
  become: false

- name: "STATE: Remove empty localized directories"
  ansible.builtin.file:
    path: "{{ locale_user_home.stdout }}/{{ item.item.name }}"
    state: absent
  loop: "{{ locale_localized_dir_checks.results }}"
  when: item.stat.exists
  become: false

- name: "STATE: Force XDG directories to English names"
  ansible.builtin.shell: |
    output=$(xdg-user-dirs-update --force 2>&1)
    echo "$output"
    if echo "$output" | grep -qE '(Moving|Creating)'; then
      exit 0  # Changed
    else
      exit 2  # Not changed - use special exit code
    fi
  args:
    executable: /bin/bash
  environment:
    LANG: "{{ locale_lang }}"
  register: locale_xdg_update_result
  changed_when: locale_xdg_update_result.rc == 0
  failed_when: locale_xdg_update_result.rc not in [0, 2]
  become: false

- name: "STATE: Update XDG user-dirs.locale configuration"
  ansible.builtin.copy:
    dest: "{{ locale_user_home.stdout }}/.config/user-dirs.locale"
    content: "{{ locale_lang }}"
    mode: "0644"
    backup: true
  become: false

- name: "VERIFY: Display updated XDG directories"
  ansible.builtin.slurp:
    src: "{{ locale_user_home.stdout }}/.config/user-dirs.dirs"
  register: locale_xdg_updated_dirs
  changed_when: false
  become: false

- name: "VERIFY: Show updated XDG configuration"
  ansible.builtin.debug:
    msg: "{{ (locale_xdg_updated_dirs.content | b64decode).split('\n') }}"

---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# XDG User Directories Configuration
# =============================================================================
# STATE: XDG user directories must be in English
# Migrates localized directories (e.g., Thai "ดาวน์โหลด") to English equivalents
# =============================================================================

# NOTE: Use locale_real_home for XDG tasks to ensure correct home directory
# when running with sudo. This fact is set in main.yml and handles both
# sudo and non-sudo cases correctly.

- name: "STATE: xdg-user-dirs-update must be installed"
  ansible.builtin.package:
    name: xdg-user-dirs
    state: present

- name: "GATHER: Check current XDG directories configuration"
  ansible.builtin.shell: |
    set -o pipefail
    if [ -f "{{ locale_real_home }}/.config/user-dirs.dirs" ]; then
      cat "{{ locale_real_home }}/.config/user-dirs.dirs"
    else
      echo "No XDG configuration file found"
    fi
  register: locale_xdg_current_dirs
  changed_when: false
  failed_when: false
  become: false

- name: "GATHER: Display current XDG directories"
  ansible.builtin.debug:
    msg: "{{ locale_xdg_current_dirs.stdout_lines | default(['Failed: Unable to retrieve XDG directories']) }}"

- name: "STATE: Check for localized directories in home"
  ansible.builtin.stat:
    path: "{{ locale_real_home }}/{{ item.name }}"
  register: locale_localized_dir_checks
  loop: "{{ locale_localized_dirs }}"
  become: false
  failed_when: false

- name: "STATE: Create target English directories if they do not exist"
  ansible.builtin.file:
    path: "{{ locale_real_home }}/{{ item.target }}"
    state: directory
    mode: "0755"
  loop: "{{ locale_localized_dirs }}"
  become: false
  when: locale_real_home != '/root'

- name: "STATE: Move content from localized directories to English directories"
  ansible.builtin.shell: |
    src_dir="{{ locale_real_home }}/{{ item.item.name }}"
    dst_dir="{{ locale_real_home }}/{{ item.item.target }}"

    # Check if source directory exists and is accessible
    if [ ! -d "$src_dir" ] || [ ! -r "$src_dir" ] || [ ! -x "$src_dir" ]; then
      exit 0
    fi

    # Move contents if directory is not empty
    if [ -n "$(ls -A "$src_dir" 2>/dev/null)" ]; then
      # Use rsync for more robust copying, then remove source
      rsync -a --remove-source-files "$src_dir/" "$dst_dir/" 2>/dev/null || \
      mv -f "$src_dir"/* "$dst_dir/" 2>/dev/null || true
    fi
  loop: "{{ locale_localized_dir_checks.results }}"
  when:
    - item.stat is defined
    - item.stat.exists | default(false)
    - locale_real_home != '/root'
  register: locale_move_result
  changed_when: locale_move_result.rc == 0
  failed_when: false
  become: false

- name: "STATE: Remove empty localized directories"
  ansible.builtin.file:
    path: "{{ locale_real_home }}/{{ item.item.name }}"
    state: absent
  loop: "{{ locale_localized_dir_checks.results }}"
  when:
    - item.stat is defined
    - item.stat.exists | default(false)
    - locale_real_home != '/root'
  become: false
  failed_when: false

- name: "STATE: Create XDG user-dirs.dirs configuration"
  ansible.builtin.copy:
    dest: "{{ locale_real_home }}/.config/user-dirs.dirs"
    content: |
      # XDG User Directories configuration
      # Generated by Ansible locale role
      XDG_DESKTOP_DIR="{{ locale_real_home }}/Desktop"
      XDG_DOWNLOAD_DIR="{{ locale_real_home }}/Downloads"
      XDG_TEMPLATES_DIR="{{ locale_real_home }}/Templates"
      XDG_PUBLICSHARE_DIR="{{ locale_real_home }}/Public"
      XDG_DOCUMENTS_DIR="{{ locale_real_home }}/Documents"
      XDG_MUSIC_DIR="{{ locale_real_home }}/Music"
      XDG_PICTURES_DIR="{{ locale_real_home }}/Pictures"
      XDG_VIDEOS_DIR="{{ locale_real_home }}/Videos"
    mode: "0644"
    backup: true
  become: false

- name: "STATE: Update XDG user-dirs.locale configuration"
  ansible.builtin.copy:
    dest: "{{ locale_real_home }}/.config/user-dirs.locale"
    content: "{{ locale_lang }}"
    mode: "0644"
    backup: true
  become: false

- name: "VERIFY: Display updated XDG directories"
  ansible.builtin.shell: |
    if [ -f "{{ locale_real_home }}/.config/user-dirs.dirs" ]; then
      cat "{{ locale_real_home }}/.config/user-dirs.dirs"
    else
      echo "No XDG configuration file found"
    fi
  register: locale_xdg_updated_dirs
  changed_when: false
  failed_when: false
  become: false

- name: "VERIFY: Show updated XDG configuration"
  ansible.builtin.debug:
    msg: "{{ locale_xdg_updated_dirs.stdout_lines | default(['Failed: Unable to retrieve updated XDG configuration']) }}"

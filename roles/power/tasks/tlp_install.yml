---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# TLP Installation Tasks
# =============================================================================

- name: Disable and mask power-profiles-daemon
  ansible.builtin.systemd:
    name: power-profiles-daemon
    state: stopped
    enabled: false
    masked: true
  failed_when: false

- name: Install TLP packages
  ansible.builtin.dnf:
    name:
      - tlp
      - tlp-pd
      - tlp-rdw
    state: present
  become: true

- name: Enable and start tlp.service
  ansible.builtin.systemd:
    name: tlp.service
    enabled: true
    state: started
  become: true
  failed_when: false

- name: Enable and start tlp-pd.service
  ansible.builtin.systemd:
    name: tlp-pd.service
    enabled: true
    state: started
  become: true
  failed_when: false

- name: Mask systemd-rfkill services
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
  become: true
  loop:
    - systemd-rfkill.service
    - systemd-rfkill.socket
  failed_when: false

- name: Configure SELinux for TLP
  ansible.posix.seboolean:
    name: tlp_can_write_to_d
    state: true
    persistent: true
  become: true
  when: ansible_selinux.status == "enabled" and ansible_selinux.mode != "disabled"
  failed_when: false

- name: Deploy TLP configuration
  ansible.builtin.template:
    src: tlp.conf.j2
    dest: /etc/tlp.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  notify: restart tlp

- name: Run TLP recommendations check
  ansible.builtin.command:
    cmd: tlp-stat -b
  register: power_tlp_recommendations
  changed_when: false
  failed_when: false
  become: true

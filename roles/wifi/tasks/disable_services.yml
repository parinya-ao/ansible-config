---
# SPDX-License-Identifier: MIT-0
# Disable unnecessary network-related services

- name: Disable nfs-client.target
  ansible.builtin.systemd:
    name: nfs-client.target
    enabled: false
    state: stopped
  become: true
  tags:
    - wifi
    - disable_services

- name: Mask gssproxy.service
  ansible.builtin.systemd:
    name: gssproxy.service
    masked: true
    state: stopped
  become: true
  tags:
    - wifi
    - disable_services

- name: Disable and mask dnf5-automatic timer
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  become: true
  loop:
    - dnf5-automatic.timer
    - dnf5-automatic.service
  when: wifi_disable_dnf5_automatic | bool
  tags:
    - wifi
    - disable_services

- name: Disable and mask CUPS socket and path
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  become: true
  loop:
    - cups.socket
    - cups.path
    - cups.service
  when: wifi_disable_cups | bool
  tags:
    - wifi
    - disable_services

- name: Disable and mask avahi-daemon socket and service
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  become: true
  loop:
    - avahi-daemon.socket
    - avahi-daemon.service
  when: wifi_disable_avahi | bool
  tags:
    - wifi
    - disable_services

- name: Disable ModemManager (4G/SIM)
  ansible.builtin.systemd:
    name: ModemManager.service
    enabled: false
    state: stopped
  become: true
  when: wifi_disable_modemmanager | bool
  tags:
    - wifi
    - disable_services

- name: Create plymouth-quit-wait override directory
  ansible.builtin.file:
    path: /etc/systemd/system/plymouth-quit-wait.service.d
    state: directory
    mode: "0755"
  become: true
  when: wifi_optimize_boot_critical_path | bool
  tags:
    - wifi
    - disable_services

- name: Remove wpa_supplicant from boot critical path
  ansible.builtin.copy:
    dest: /etc/systemd/system/plymouth-quit-wait.service.d/override.conf
    content: |
      [Unit]
      After=
      After=rc-local.service plymouth-start.service basic.target
    mode: "0644"
  become: true
  when: wifi_optimize_boot_critical_path | bool
  notify:
    - Reload systemd daemon
  tags:
    - wifi
    - disable_services

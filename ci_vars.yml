---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# CI-Specific Ansible Variables for Fedora Rawhide
# =============================================================================
# These variables override defaults for CI/CD pipeline execution
# Optimized for Fedora Rawhide (rolling development branch) with DNF5
# Disables features that require physical hardware, user interaction,
# or services that don't work in containerized environments
#
# PARALLEL REDUNDANCY: This config works with both GitHub Actions and GitLab CI
# =============================================================================

# =============================================================================
# Common Role Variables
# =============================================================================
# Disable RPM Fusion (third-party repos) for CI
common_enable_rpm_fusion: false

# Disable NVIDIA driver installation (no GPU in containers)
common_install_nvidia_drivers: false

# Disable custom DNS configuration
common_configure_custom_dns: false

# Disable D2 tool installation
common_install_d2: false

# Skip disk space check in CI (containers have limited disk)
common_skip_disk_check: true

# =============================================================================
# Desktop Role Variables
# =============================================================================
# Disable Flatpak font access (no GUI in CI)
desktop_enable_flatpak_font_access: false

# Reduce installed Flatpak apps in CI
desktop_flatpak_apps:
  - com.github.MarkText

# =============================================================================
# Developer Role Variables
# =============================================================================
# Skip Android SDK in CI (large download)
developer_install_android_sdk: false

# Skip Flutter in CI (large download)
developer_install_flutter: false

# =============================================================================
# Docker Role Variables
# =============================================================================
# Use DNF5 native for Fedora Rawhide (default package manager)
docker_use_fedora_native: true
docker_use_dnf5: true

# =============================================================================
# Multimedia Role Variables
# =============================================================================
# Enable codecs but skip hardware acceleration in CI
multimedia_enable_hardware_acceleration: false

# =============================================================================
# Locale Role Variables
# =============================================================================
# Keep English-only, but skip user directory migrations in CI
locale_configure_xdg_dirs: false

# =============================================================================
# WiFi Role Variables
# =============================================================================
# Skip WiFi configuration in CI (no wireless hardware)
wifi_install_iw: false
wifi_configure_regulatory_domain: false
wifi_task: ""  # Empty to skip all WiFi tasks in CI
wifi_enable_network_tuning: false  # Skip network tuning in CI
wifi_enable_bluetooth_optimization: false  # Skip Bluetooth optimization in CI
wifi_disable_usb_autosuspend: false  # Skip USB config in CI

# =============================================================================
# Stability Role Variables
# =============================================================================
# Disable systemd-dependent features in CI (containers don't have systemd as PID 1)
stability_dnf_automatic_enable: false  # Skip timer enable (daemon-reload fails in containers)
stability_firewalld_enable: false  # Skip firewalld (requires systemd)
stability_snapper_enable: false  # Skip snapper (requires systemd timers, Btrfs not in CI)

# =============================================================================
# Power Role Variables
# =============================================================================
# Disable TLP in CI (no battery in containers)
power_install_tlp: false

# =============================================================================
# Embed Role Variables (STM32CubeMX removed)
# =============================================================================
# ARM toolchain enabled for CI testing
embed_install_arm_toolchain: true

# ESP tools enabled for CI testing
embed_install_esp_tools: true

# Serial tools enabled for CI testing
embed_install_serial_tools: true

# Dialout group configuration
embed_configure_dialout_group: true

# =============================================================================
# Logging Configuration
# =============================================================================
# Enable verbose logging for CI debugging
ansible_verbosity: 1
ansible_callback_whitelist:
  - profile_tasks
  - timer
  - yaml

# =============================================================================
# Recovery and Monitoring Configuration
# =============================================================================
# Enable recovery logging in CI
recovery_log_path: /var/log/ansible_recovery.log
recovery_webhook_url: ""  # Set to your Discord/Slack webhook URL for notifications

# Health check configuration
health_critical_services: []  # Empty in CI (no systemd)

# =============================================================================
# Parallel Redundancy Configuration
# =============================================================================
# These variables ensure consistent behavior across GitHub Actions and GitLab CI

# CI platform detection (auto-detected, but can be overridden)
ci_platform: >-
  {{ lookup('env', 'GITLAB_CI') | ternary('gitlab',
  lookup('env', 'GITHUB_ACTIONS') | ternary('github', 'unknown')) }}

# Shared cache directory for both CI platforms
cache_dir: "{{ lookup('env', 'CI_PROJECT_DIR') | default(lookup('env', 'GITHUB_WORKSPACE') | default('/tmp/ansible-cache')) }}"

# Parallel execution settings
ansible_forks: 4  # Conservative for CI runners
ansible_strategy: linear  # Ensures consistent ordering across platforms

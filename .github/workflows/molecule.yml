---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# Molecule CI/CD Pipeline for Fedora Rawhide
# =============================================================================
# Tests Ansible collection using Molecule with ansible-native approach
# Uses shared state for efficient multi-scenario testing
# PARALLEL REDUNDANCY: Synced with GitLab CI for consistent behavior
# =============================================================================

name: Molecule Test

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PY_COLORS: "1"
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_LINT_STRICT: "1"
  # Parallel redundancy settings
  ANSIBLE_FORKS: "4"
  ANSIBLE_STRATEGY: "linear"
  # Recovery notification (set webhook URL in secrets)
  RECOVERY_WEBHOOK_URL: "${{ secrets.RECOVERY_WEBHOOK_URL }}"

jobs:
  # =============================================================================
  # STAGE 1: LINT AND VALIDATE
  # =============================================================================

  validate:
    name: Validate Ansible Content
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install ansible-core ansible-lint yamllint molecule molecule-plugins[podman]

      - name: Run yamllint
        run: yamllint -c .yamllint .

      - name: Run ansible-lint
        run: ansible-lint --profile production playbook.yaml

      - name: Validate molecule configuration
        run: |
          if [ -d "molecule" ]; then
            molecule list
          fi

  # =============================================================================
  # STAGE 2: MOLECULE TESTS (Fedora Rawhide)
  # =============================================================================

  molecule-test:
    name: Molecule Test on Fedora Rawhide
    runs-on: ubuntu-24.04
    needs: [validate]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
          - podman-docker
          # Add more scenarios here:
          # - scenario1
          # - scenario2

    container:
      image: fedora:rawhide
      options: --privileged -v /sys/fs/cgroup:/sys/fs/cgroup:ro --security-opt seccomp=unconfined

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Python Environment
        run: |
          dnf install -y python3 python3-pip python3-libdnf5 python3-devel
          dnf install -y glibc-langpack-en podman
          python3 --version

      - name: Install Molecule and Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install molecule molecule-plugins[podman] ansible-core

      - name: Install Collection Requirements
        run: |
          if [ -f "molecule/requirements.yml" ]; then
            ansible-galaxy collection install -r molecule/requirements.yml
          elif [ -f "requirements.yml" ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Make init.sh Executable
        run: chmod +x init.sh

      - name: Initialize Ansible Environment
        run: |
          bash init.sh --skip-install --skip-check

      - name: Run Molecule Test
        run: |
          molecule test --scenario-name ${{ matrix.scenario }} --report --command-borders
        env:
          MOLECULE_GLOB: "molecule/**/molecule.yml"

      - name: Upload Molecule Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: molecule-logs-${{ matrix.scenario }}
          path: |
            .cache/molecule/*/logs/
            *.log
            ansible.log
          retention-days: 7

  # =============================================================================
  # STAGE 3: INTEGRATION TEST (All Scenarios with Shared State)
  # =============================================================================

  molecule-integration:
    name: Molecule Integration Test
    runs-on: ubuntu-24.04
    needs: [validate]
    timeout-minutes: 60
    container:
      image: fedora:rawhide
      options: --privileged -v /sys/fs/cgroup:/sys/fs/cgroup:ro --security-opt seccomp=unconfined

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Python Environment
        run: |
          dnf install -y python3 python3-pip python3-libdnf5 python3-devel podman
          dnf install -y glibc-langpack-en
          python3 --version

      - name: Install Molecule and Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install molecule molecule-plugins[podman] ansible-core

      - name: Install Collection Requirements
        run: |
          if [ -f "molecule/requirements.yml" ]; then
            ansible-galaxy collection install -r molecule/requirements.yml
          elif [ -f "requirements.yml" ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Make init.sh Executable
        run: chmod +x init.sh

      - name: Initialize Ansible Environment
        run: |
          bash init.sh --skip-install --skip-check

      - name: Run All Molecule Scenarios (Shared State)
        run: |
          export MOLECULE_GLOB="molecule/**/molecule.yml"
          molecule test --all --shared-state --report --command-borders

      - name: Upload Integration Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: molecule-integration-logs
          path: |
            .cache/molecule/*/logs/
            *.log
            ansible.log
          retention-days: 7

  # =============================================================================
  # STAGE 4: FINAL VALIDATION
  # =============================================================================

  success-check:
    name: Pipeline Success Check
    runs-on: ubuntu-24.04
    needs: [validate, molecule-test, molecule-integration]
    if: always()
    steps:
      - name: Check Pipeline Status
        run: |
          if [[ "${{ needs.validate.result }}" == "success" ]] && \
             [[ "${{ needs.molecule-test.result }}" == "success" || "${{ needs.molecule-test.result }}" == "skipped" ]] && \
             [[ "${{ needs.molecule-integration.result }}" == "success" || "${{ needs.molecule-integration.result }}" == "skipped" ]]; then
            echo "✓ PASSED: All Molecule tests completed successfully"
            echo "Fedora Rawhide is ready for production!"
            exit 0
          else
            echo "✗ FAILED: One or more pipeline stages failed"
            echo "Please review the logs above for details"
            exit 1
          fi

      - name: Send Success Notification (if all passed)
        if: needs.molecule-test.result == 'success' && needs.molecule-integration.result == 'success'
        run: |
          if [ -n "${{ env.RECOVERY_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ env.RECOVERY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"✅ GitHub Actions: All Molecule tests passed!"}'
          fi
        continue-on-error: true

# Ansible Configuration

[defaults]
# Execution
forks = 10
pipelining = True
gathering = smart

# Fact caching
fact_caching = jsonfile
fact_caching_connection = ./.ansible/facts
fact_caching_timeout = 86400
gather_subset = !facter,!ohai

# Callbacks
callbacks_enabled = profile_tasks, timer
stdout_callback = ansible.builtin.default
bin_ansible_callbacks = True

# Inventory
inventory = ./inventory

# Paths
roles_path = ./collections/ansible_collections/local/workstation/roles
collections_path = ./collections

# Retry files
retry_files_enabled = False

# Host key checking
host_key_checking = False

# Deprecation warnings
deprecation_warnings = False

# =============================================================================
# CENTRALIZED LOGGING AND MONITORING
# =============================================================================

# Centralized log file for all Ansible runs
log_path = ./ansible.log

# Log all task actions for audit and recovery tracking
log_filter = *password*,*secret*,*key*

# Enable detailed logging for recovery analysis
verbosity = 1

# Store playbook artifacts for rollback
artifact_path = ./.ansible/artifacts

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o UserKnownHostsFile=/dev/null
pipelining = True
retries = 2

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[inventory]
cache = True
cache_plugin = jsonfile
cache_connection = ./.ansible/inventory_cache
cache_timeout = 86400

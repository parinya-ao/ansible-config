# SPDX-License-Identifier: MIT-0
# Molecule collection requirements for podman-docker scenario
# Includes both Podman and Docker collections for redundancy

collections:
  # Primary: Podman container management
  - name: containers.podman
    version: ">=1.10.0"

  # Secondary: Docker container management (redundancy)
  - name: community.docker
    version: ">=3.10.4"

  # Additional collections for testing
  - name: community.general
    version: ">=8.0.0"
  - name: ansible.posix
    version: ">=1.5.0"

---
# SPDX-License-Identifier: MIT-0
# Constructed inventory - creates dynamic groups
# Loaded second (02- prefix) after static hosts are defined

plugin: ansible.builtin.constructed
strict: false

groups:
  # Create podman group for hosts using podman runtime
  podman_containers: container_runtime == 'podman'
  
  # Create docker group for hosts using docker runtime
  docker_containers: container_runtime == 'docker'
  
  # Create containers group for all container hosts
  containers: inventory_hostname.startswith('molecule')

compose:
  # Set ansible_connection based on runtime type
  ansible_connection: >-
    {{ 'containers.podman.podman' if container_runtime == 'podman' else 'community.docker.docker' }}

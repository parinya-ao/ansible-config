---
# SPDX-License-Identifier: MIT-0
# Stability role - Fedora system stability and hardening

- name: Display stability role information
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Fedora Stability Role"
      - "=========================================="
      - "Level 1 (Basic): {{ stability_enable_level1_basic }}"
      - "  - dnf-automatic: {{ stability_dnf_automatic_enable }}"
      - "  - firewalld: {{ stability_firewalld_enable }}"
      - "Level 2 (Snapshot): {{ stability_enable_level2_snapshot }}"
      - "  - Snapper Btrfs: {{ stability_snapper_enable }}"
      - "Level 3 (Hardening): {{ stability_enable_level3_hardening }}"
      - "  - sysctl: {{ stability_sysctl_hardening_enable }}"
      - "=========================================="

# Import level-specific task files
- name: Include Level 1 - Basic stability tasks
  ansible.builtin.include_tasks: level1_basic.yml
  when: stability_enable_level1_basic | bool
  tags:
    - stability
    - level1

- name: Include Level 2 - Snapshot & Rollback tasks
  ansible.builtin.include_tasks: level2_snapshot.yml
  when: stability_enable_level2_snapshot | bool
  tags:
    - stability
    - level2

- name: Include Level 3 - Kernel hardening tasks
  ansible.builtin.include_tasks: level3_hardening.yml
  when: stability_enable_level3_hardening | bool
  tags:
    - stability
    - level3

- name: Display completion summary
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Stability Configuration Complete!"
      - "=========================================="
      - "For Level 1 (Basic):"
      - "  - Check dnf-automatic: systemctl status dnf-automatic.timer"
      - "  - Check firewalld: systemctl status firewalld"
      - ""
      - "For Level 2 (Snapshot):"
      - "  - List snapshots: snapper list"
      - "  - Create manual: snapper create -d 'description'"
      - "  - Rollback: snapper rollback"
      - ""
      - "For Level 3 (Hardening):"
      - "  - View settings: sysctl -a | grep -E '(accept_redirects|rp_filter|kptr)'"
      - "=========================================="

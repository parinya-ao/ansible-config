---
# SPDX-License-Identifier: MIT-0
# Level 1: Basic Stability - dnf-automatic and firewalld

# =============================================================================
# dnf-automatic - Security-only automatic updates
# =============================================================================
- name: Install dnf-automatic
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_dnf_automatic_enable | bool
  tags:
    - stability
    - level1
    - dnf_automatic

- name: Ensure dnf-automatic config exists
  ansible.builtin.file:
    path: /etc/dnf/automatic.conf
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_dnf_automatic_enable | bool
  tags:
    - stability
    - level1
    - dnf_automatic

- name: Ensure dnf-automatic config has base sections (if file was empty)
  ansible.builtin.blockinfile:
    path: /etc/dnf/automatic.conf
    block: |
      [commands]
      # What kind of upgrade to perform:
      # default                            = all available upgrades
      # security                           = security upgrades only
      upgrade_type = default
      # Whether updates should be downloaded when they are available
      download_updates = no
      # Whether updates should be applied when they are available
      apply_updates = no

      [emitters]
      # Emit via motd
      emit_via = motd

      # Whether to emit messages via systemd journal
      emit_via_journal = no
    marker: "# {mark} ANSIBLE MANAGED BLOCK - base config"
    create: false
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_dnf_automatic_enable | bool
  tags:
    - stability
    - level1
    - dnf_automatic

- name: Configure dnf-automatic for security updates
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: "^{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "upgrade_type", value: "{{ stability_dnf_automatic_upgrade_type }}" }
    - { key: "apply_updates", value: "{{ stability_dnf_automatic_apply_updates | bool | lower }}" }
    - { key: "emit_via", value: "motd" }
    - { key: "download_updates", value: "true" }
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_dnf_automatic_enable | bool
  notify:
    - Restart dnf-automatic timer
  tags:
    - stability
    - level1
    - dnf_automatic

- name: Enable and start dnf-automatic timer
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: true
    state: started
    daemon_reload: false
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_dnf_automatic_enable | bool
  failed_when: false
  tags:
    - stability
    - level1
    - dnf_automatic

# =============================================================================
# Firewalld - Basic firewall protection
# =============================================================================
- name: Ensure firewalld is installed
  ansible.builtin.dnf:
    name: firewalld
    state: present
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_firewalld_enable | bool
  tags:
    - stability
    - level1
    - firewalld

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
    daemon_reload: false
  become: true
  when:
    - stability_enable_level1_basic | bool
    - stability_firewalld_enable | bool
  failed_when: false
  tags:
    - stability
    - level1
    - firewalld

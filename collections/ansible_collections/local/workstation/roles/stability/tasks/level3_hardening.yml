---
# SPDX-License-Identifier: MIT-0
# Level 3: Kernel Hardening - sysctl parameters

- name: Create kernel hardening sysctl configuration
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-stability.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      # SPDX-License-Identifier: MIT-0
      # Fedora Stability - Kernel Hardening Configuration
      # Generated by Ansible stability role

      # =============================================================================
      # Network Hardening - Prevent network attacks
      # =============================================================================
      # Disable ICMP redirects (prevent MITM attacks)
      net.ipv4.conf.all.accept_redirects = {{ stability_sysctl_net_ipv4_accept_redirects }}
      net.ipv4.conf.all.send_redirects = {{ stability_sysctl_net_ipv4_send_redirects }}

      # Enable reverse path filtering (prevent IP spoofing)
      net.ipv4.conf.all.rp_filter = {{ stability_sysctl_net_ipv4_rp_filter }}

      # =============================================================================
      # Kernel Information Protection - Prevent kernel pointer leaks
      # =============================================================================
      # Restrict kernel pointer access in /proc and kernel logs
      kernel.kptr_restrict = {{ stability_sysctl_kernel_ptr_restrict }}
      kernel.dmesg_restrict = {{ stability_sysctl_dmesg_restrict }}

      # =============================================================================
      # Core Dump Protection - Prevent sensitive data leakage via core dumps
      # =============================================================================
      # Disable setuid core dumps (prevent privilege escalation via core dumps)
      fs.suid_dumpable = {{ stability_sysctl_fs_suid_dumpable }}
  become: true
  when:
    - stability_enable_level3_hardening | bool
    - stability_sysctl_hardening_enable | bool
  notify:
    - Reload sysctl settings
  tags:
    - stability
    - level3
    - hardening
    - sysctl

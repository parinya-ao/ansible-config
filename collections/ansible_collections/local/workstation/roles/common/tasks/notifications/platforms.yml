---
# SPDX-License-Identifier: MIT-0
# Notification helpers for different platforms
# Include these tasks with appropriate vars set

# =============================================================================
# Discord Webhook Notification
# =============================================================================
- name: Send Discord notification
  ansible.builtin.uri:
    url: "{{ discord_webhook_url }}"
    method: POST
    body_format: json
    body:
      embeds:
        - title: "{{ notification_title | default('Ansible Recovery Alert') }}"
          description: "{{ notification_message | default('A recovery event occurred') }}"
          color: "{{ notification_color | default(16711680) }}"  # Red for alerts
          fields:
            - name: "Host"
              value: "{{ inventory_hostname }}"
              inline: true
            - name: "Task"
              value: "{{ recovery_task_name | default('unknown') }}"
              inline: true
            - name: "Time"
              value: "{{ ansible_date_time.iso8601 | default('N/A') }}"
              inline: true
            - name: "Error"
              value: "{{ ansible_failed_result.msg | default('Unknown error') | truncate(1024) }}"
              inline: false
          footer:
            text: "Ansible Recovery System"
          timestamp: "{{ ansible_date_time.iso8601 | default(omit) }}"
    timeout: 10
    status_code:
      - 200
      - 204
  failed_when: false
  delegate_to: localhost
  run_once: true
  when:
    - discord_webhook_url is defined
    - discord_webhook_url | length > 0
  tags:
    - notification
    - discord

# =============================================================================
# Slack Webhook Notification
# =============================================================================
- name: Send Slack notification
  ansible.builtin.uri:
    url: "{{ slack_webhook_url }}"
    method: POST
    body_format: json
    body:
      attachments:
        - color: "{{ slack_color | default('danger') }}"
          title: "{{ notification_title | default('Ansible Recovery Alert') }}"
          text: "{{ notification_message | default('A recovery event occurred') }}"
          fields:
            - title: "Host"
              value: "{{ inventory_hostname }}"
              short: true
            - title: "Task"
              value: "{{ recovery_task_name | default('unknown') }}"
              short: true
            - title: "Time"
              value: "{{ ansible_date_time.iso8601 | default('N/A') }}"
              short: true
            - title: "Error"
              value: "{{ ansible_failed_result.msg | default('Unknown error') | truncate(1024) }}"
              short: false
          footer: "Ansible Recovery System"
          ts: "{{ ansible_date_time.epoch | default(omit) }}"
    timeout: 10
    status_code:
      - 200
      - 201
  failed_when: false
  delegate_to: localhost
  run_once: true
  when:
    - slack_webhook_url is defined
    - slack_webhook_url | length > 0
  tags:
    - notification
    - slack

# =============================================================================
# Line Notify Notification
# =============================================================================
- name: Send Line Notify notification
  ansible.builtin.uri:
    url: "https://notify-api.line.me/api/notify"
    method: POST
    headers:
      Authorization: "Bearer {{ line_notify_token }}"
      Content-Type: "application/x-www-form-urlencoded"
    body_format: form-urlencoded
    body:
      message: |
        🔧 Ansible Recovery Alert
        
        Host: {{ inventory_hostname }}
        Task: {{ recovery_task_name | default('unknown') }}
        Time: {{ ansible_date_time.iso8601 | default('N/A') }}
        
        Error: {{ ansible_failed_result.msg | default('Unknown error') | truncate(500) }}
    timeout: 10
    status_code:
      - 200
  failed_when: false
  delegate_to: localhost
  run_once: true
  when:
    - line_notify_token is defined
    - line_notify_token | length > 0
  tags:
    - notification
    - line

# =============================================================================
# Generic Webhook Notification
# =============================================================================
- name: Send generic webhook notification
  ansible.builtin.uri:
    url: "{{ generic_webhook_url }}"
    method: POST
    body_format: json
    body:
      event: "recovery"
      host: "{{ inventory_hostname }}"
      task: "{{ recovery_task_name | default('unknown') }}"
      timestamp: "{{ ansible_date_time.iso8601 | default('N/A') }}"
      error: "{{ ansible_failed_result.msg | default('Unknown error') }}"
      severity: "{{ notification_severity | default('warning') }}"
    headers:
      Content-Type: application/json
    timeout: 10
    status_code:
      - 200
      - 201
      - 202
      - 204
  failed_when: false
  delegate_to: localhost
  run_once: true
  when:
    - generic_webhook_url is defined
    - generic_webhook_url | length > 0
  tags:
    - notification
    - webhook

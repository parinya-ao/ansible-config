---
# SPDX-License-Identifier: MIT-0
# Base packages installation tasks with auto-recovery

- name: Managed Package Installation Operation
  ansible.builtin.block:
    - name: Install base system packages
      ansible.builtin.dnf:
        name: "{{ common_base_packages }}"
        state: present
      become: true
      register: common_packages_install_result
      tags:
        - packages
        - base-packages

    - name: Display installed packages summary
      ansible.builtin.debug:
        msg: >-
          {{ common_packages_install_result.results | default([]) | length }}
          packages processed
      changed_when: false
      tags:
        - packages
        - base-packages
  rescue:
    - name: Set recovery task name
      ansible.builtin.set_fact:
        recovery_task_name: "package_installation"
        recovery_clear_dnf_locks: true

    - name: Execute recovery tasks
      ansible.builtin.import_tasks: recovery.yml
      tags:
        - always
        - recovery

    - name: Retry package installation after recovery
      ansible.builtin.dnf:
        name: "{{ common_base_packages }}"
        state: present
      become: true
      register: common_packages_retry_result
      failed_when: false
      tags:
        - packages
        - base-packages

  always:
    - name: Run health check after package installation
      ansible.builtin.import_tasks: health_check.yml
      tags:
        - always
        - health-check

---
# SPDX-License-Identifier: MIT-0
# System update tasks with auto-recovery
# Note: No timeout is set on dnf upgrade commands to allow long-running updates to complete

- name: Managed System Update Operation
  block:
    - name: Update all packages (refresh metadata + upgrade)
      ansible.builtin.command: dnf upgrade --refresh -y -v
      become: true
      when:
        - common_system_update_enabled
        - lookup('env', 'CI') != 'true'
      register: common_dnf_update_result
      retries: "{{ common_dnf_retries }}"
      delay: "{{ common_dnf_delay }}"
      until: common_dnf_update_result is succeeded
      changed_when: common_dnf_update_result.rc == 0
      failed_when: common_dnf_update_result.rc != 0
      # No timeout - allows unlimited time for system updates
      tags:
        - system-update
        - update

    - name: Display update summary
      ansible.builtin.debug:
        msg: "System updated successfully"
      when:
        - common_system_update_enabled
        - common_dnf_update_result is changed
      tags:
        - system-update
        - update
  rescue:
    - name: Set recovery task name
      ansible.builtin.set_fact:
        recovery_task_name: "system_update"
        recovery_clear_dnf_locks: true

    - name: Execute recovery tasks
      ansible.builtin.import_tasks: recovery.yml
      tags:
        - always
        - recovery

    - name: Retry system update after recovery
      ansible.builtin.command: dnf upgrade --refresh -y
      become: true
      register: common_dnf_update_retry_result
      when: common_system_update_enabled
      failed_when: false
      changed_when: common_dnf_update_retry_result.rc == 0
      tags:
        - system-update
        - update

  always:
    - name: Run health check after update
      ansible.builtin.import_tasks: health_check.yml
      tags:
        - always
        - health-check

---
# SPDX-License-Identifier: MIT-0
# Default variables for multimedia role

# Feature toggles
multimedia_install_codecs: true
multimedia_install_video_acceleration: true
multimedia_install_openh264: true

# Hardware video acceleration options
# Set to "intel", "amd", or "nvidia" for vendor-specific drivers
# Leave empty for auto-detection
multimedia_gpu_vendor: "" 

# Auto-detect GPU vendor (intel, amd, nvidia, or empty)
multimedia_auto_detect_gpu: true

# Media codec packages
multimedia_codec_packages:
  - ffmpeg
  - ffmpeg-libs
  - libva
  - libva-utils
  - gstreamer1-plugins-base
  - gstreamer1-plugins-good
  - gstreamer1-plugins-ugly
  - gstreamer1-plugins-bad-free
  - gstreamer1-libav

# OpenH264 packages (for Firefox/browser H.264 support)
multimedia_openh264_packages:
  - openh264
  - gstreamer1-plugin-openh264
  - mozilla-openh264

# Intel-specific video acceleration packages (VA-API)
# For Intel Iris Xe, UHD, and HD Graphics
multimedia_intel_packages:
  - intel-media-driver
  - libva-utils
  - intel-compute-runtime

# AMD-specific video acceleration packages (VA-API)
multimedia_amd_packages:
  - mesa-va-drivers-freeworld
  - mesa-vdpau-drivers-freeworld
  - mesa-va-drivers-freeworld.i686
  - mesa-vdpau-drivers-freeworld.i686

# NVIDIA-specific video acceleration packages (NVDEC/CUVID)
multimedia_nvidia_packages:
  - nvidia-driver
  - nvidia-driver-libs
  - nvidia-driver-cuda
  - nvidia-driver-cuda-libs

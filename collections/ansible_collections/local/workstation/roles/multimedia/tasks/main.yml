---
# SPDX-License-Identifier: MIT-0
# tasks file for roles/multimedia

- name: Display multimedia configuration
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Multimedia Codec and Driver Setup"
      - "=========================================="
      - "Install Codecs: {{ multimedia_install_codecs }}"
      - "Install Video Acceleration: {{ multimedia_install_video_acceleration }}"
      - "Install OpenH264: {{ multimedia_install_openh264 }}"
      - "GPU Vendor: {{ multimedia_gpu_vendor | default('Auto-detect', true) }}"
      - "=========================================="
  tags:
    - multimedia
    - always

- name: Auto-detect Intel GPU
  ansible.builtin.shell: |
    lspci -nn 2>/dev/null | grep -i "vga.*intel\|3d.*intel\|display.*intel" | head -1
  register: multimedia_intel_gpu_detect
  changed_when: false
  failed_when: false
  when:
    - multimedia_auto_detect_gpu | bool
    - multimedia_gpu_vendor == "" or multimedia_gpu_vendor == "intel"
  tags:
    - multimedia
    - detect

- name: Set GPU vendor to Intel if detected
  ansible.builtin.set_fact:
    multimedia_gpu_vendor: "intel"
  when:
    - multimedia_auto_detect_gpu | bool
    - multimedia_gpu_vendor == "" or multimedia_gpu_vendor == "intel"
    - multimedia_intel_gpu_detect.stdout | length > 0
  tags:
    - multimedia
    - detect

- name: Display detected GPU vendor
  ansible.builtin.debug:
    msg: "Detected GPU Vendor: {{ multimedia_gpu_vendor | default('Unknown', true) }}"
  tags:
    - multimedia
    - detect

- name: Check if RPM Fusion is available
  ansible.builtin.stat:
    path: /etc/yum.repos.d/rpmfusion-free.repo
  register: multimedia_rpmfusion_check
  changed_when: false

- name: Install multimedia codec packages
  ansible.builtin.dnf:
    name: "@multimedia"
    state: present
  when: multimedia_install_codecs | bool
  become: true
  tags:
    - multimedia
    - codecs

- name: Swap to full FFMPEG (remove conflicting free packages)
  ansible.builtin.dnf:
    name: "ffmpeg"
    state: present
    allowerasing: true
  when:
    - multimedia_install_codecs | bool
    - multimedia_rpmfusion_check.stat.exists
  become: true
  tags:
    - multimedia
    - codecs

- name: Install FFMPEG and related packages
  ansible.builtin.dnf:
    name: "{{ multimedia_codec_packages }}"
    state: present
    allowerasing: true
  when:
    - multimedia_install_codecs | bool
    - multimedia_rpmfusion_check.stat.exists
  become: true
  tags:
    - multimedia
    - codecs

- name: Install sound and video complementary packages
  ansible.builtin.dnf:
    name: "@sound-and-video"
    state: present
  when: multimedia_install_codecs | bool
  become: true
  tags:
    - multimedia
    - codecs

- name: Install hardware video acceleration base packages
  ansible.builtin.dnf:
    name:
      - libva
      - libva-utils
    state: present
  when: multimedia_install_video_acceleration | bool
  become: true
  tags:
    - multimedia
    - video-acceleration

- name: Install ffmpeg-libs from RPM Fusion
  ansible.builtin.dnf:
    name: ffmpeg-libs
    state: present
  when:
    - multimedia_install_video_acceleration | bool
    - multimedia_rpmfusion_check.stat.exists
  become: true
  tags:
    - multimedia
    - video-acceleration

- name: Display RPM Fusion unavailable notice
  ansible.builtin.debug:
    msg: "RPM Fusion repositories not available - skipping FFmpeg and some hardware acceleration packages"
  when:
    - multimedia_install_codecs | bool
    - not multimedia_rpmfusion_check.stat.exists

- name: Install Intel video acceleration drivers
  ansible.builtin.dnf:
    name: "{{ multimedia_intel_packages }}"
    state: present
  when:
    - multimedia_install_video_acceleration | bool
    - multimedia_gpu_vendor == "intel"
  become: true
  tags:
    - multimedia
    - video-acceleration
    - intel

- name: Install AMD video acceleration drivers
  ansible.builtin.dnf:
    name: "{{ multimedia_amd_packages }}"
    state: present
    allowerasing: true
  when:
    - multimedia_install_video_acceleration | bool
    - multimedia_gpu_vendor == "amd"
    - multimedia_rpmfusion_check.stat.exists
  become: true
  tags:
    - multimedia
    - video-acceleration
    - amd

- name: Install OpenH264 packages
  ansible.builtin.dnf:
    name: "{{ multimedia_openh264_packages }}"
    state: present
  when: multimedia_install_openh264 | bool
  become: true
  tags:
    - multimedia
    - openh264

- name: Check Cisco OpenH264 repository status
  ansible.builtin.shell: |
    set -o pipefail
    dnf repolist enabled 2>/dev/null | grep -q "fedora-cisco-openh264" || \
    dnf config-manager repo-fedora-cisco-openh264 2>/dev/null | grep -q "enabled = 1" || \
    grep -q "^enabled=1" /etc/yum.repos.d/fedora-cisco-openh264.repo 2>/dev/null && echo "enabled" || echo "disabled"
  register: multimedia_openh264_status
  changed_when: false
  failed_when: false
  when: multimedia_install_openh264 | bool
  become: true
  tags:
    - multimedia
    - openh264

- name: Enable Cisco OpenH264 repository
  ansible.builtin.command: dnf config-manager setopt fedora-cisco-openh264.enabled=1
  when:
    - multimedia_install_openh264 | bool
    - multimedia_openh264_status.stdout is defined
    - multimedia_openh264_status.stdout != "enabled"
  become: true
  changed_when: false
  tags:
    - multimedia
    - openh264

- name: Verify VA-API video acceleration (Intel)
  ansible.builtin.shell: |
    vainfo --display drm 2>&1 | grep -E "VAProfileH264|VAProfileHEVC" | head -5
  register: multimedia_vaapi_verify
  changed_when: false
  failed_when: false
  when:
    - multimedia_install_video_acceleration | bool
    - multimedia_gpu_vendor == "intel"
  tags:
    - multimedia
    - video-acceleration
    - verify

- name: Display VA-API verification result
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "VA-API Video Acceleration Verification"
      - "=========================================="
      - "GPU Vendor: {{ multimedia_gpu_vendor }}"
      - "VA-API Profiles Detected:"
      - "{{ multimedia_vaapi_verify.stdout_lines | default(['No VA-API profiles detected'], true) }}"
      - "=========================================="
      - "Note: If no profiles detected, try running 'vainfo' manually"
      - "=========================================="
  when:
    - multimedia_install_video_acceleration | bool
    - multimedia_gpu_vendor == "intel"
  tags:
    - multimedia
    - video-acceleration
    - verify

---
# =============================================================================
# Ansible Configuration Playbook
# This playbook configures a Fedora/Ultramarine workstation with development
# tools, desktop environment, and multimedia codecs.
# Uses Podman for container management (Docker-native alternative).
# =============================================================================

- name: Setup localhost workstation
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display system information
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Ansible Configuration Playbook"
          - "=========================================="
          - "Target Host: {{ inventory_hostname }}"
          - "OS Family: {{ ansible_facts.os_family }}"
          - "Distribution: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"
          - "Architecture: {{ ansible_facts.architecture }}"
          - "Python Version: {{ ansible_facts.python_version }}"
          - "=========================================="

    - name: Display roles to be applied
      ansible.builtin.debug:
        msg:
          - "Roles to be applied:"
          - "  1. common      - Base system configuration"
          - "  2. locale      - English-only environment enforcement"
          - "  3. git        - Git configuration with SSH signing"
          - "  4. stability   - Fedora stability and hardening"
          - "  5. developer   - Development tools and runtimes"
          - "  6. multimedia  - Multimedia codecs and video acceleration"
          - "  7. embed       - Embedded development"
          - "=========================================="

    - name: Display Ansible version
      ansible.builtin.shell: |
        if command -v ansible >/dev/null 2>&1; then
          ansible --version
        elif [ -f ./.ansible-venv/bin/ansible ]; then
          ./.ansible-venv/bin/ansible --version
        else
          echo "Ansible version: Not found"
        fi
      register: ansible_version_output
      changed_when: false
      failed_when: false

    - name: Display Ansible version output
      ansible.builtin.debug:
        msg: "{{ ansible_version_output.stdout_lines | default(['Unable to determine Ansible version']) }}"

  roles:
    - role: local.workstation.common
      tags:
        - common
        - base

    - role: local.workstation.locale
      tags:
        - locale
        - language

    - role: local.workstation.git
      tags:
        - git
        - dotfiles

    - role: local.workstation.stability
      tags:
        - stability
        - security
        - hardening
        - snapshot

    - role: local.workstation.developer
      tags:
        - developer
        - development

    - role: local.workstation.multimedia
      tags:
        - multimedia
        - codecs

    - role: local.workstation.embed
      tags:
        - embed
        - embedded
        - esp

  post_tasks:
    - name: Display completion summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Playbook Execution Completed"
          - "=========================================="
          - "Target Host: {{ inventory_hostname }}"
          - "Timestamp: {{ ansible_facts.date_time.iso8601 }}"
          - "=========================================="

    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Next Steps:"
          - "=========================================="
          - "1. Log out and log back in for group changes"
          - "2. Verify installations:"
          - "   - node --version"
          - "   - cargo --version"
          - "3. Run 'flatpak list' to see installed apps"
          - "=========================================="

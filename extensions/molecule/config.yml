---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# Base Molecule Configuration (ansible-native approach)
# =============================================================================
# This configuration is inherited by all scenarios
# Uses shared state for efficient multi-scenario testing
# Primary: Podman containers with systemd support
# Secondary/Redundant: Docker containers
# =============================================================================

ansible:
  executor:
    backend: ansible-playbook
    args:
      ansible_playbook:
        - --inventory=${MOLECULE_SCENARIO_DIRECTORY}/../inventory.yml
  env:
    ANSIBLE_FORCE_COLOR: "true"
    ANSIBLE_STDOUT_CALLBACK: yaml
    ANSIBLE_HOST_KEY_CHECKING: "false"
  cfg:
    defaults:
      fact_caching: memory
      gathering: smart
      host_key_checking: false
      timeout: 30
    ssh_connection:
      pipelining: true
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    prepare: prepare.yml
    verify: verify.yml
    cleanup: cleanup.yml

scenario:
  test_sequence:
    - prepare
    - converge
    - verify
    - idempotence
    - verify
    - cleanup

shared_state: true

verifier:
  name: ansible
  enabled: true

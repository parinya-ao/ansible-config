---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# Molecule Test Inventory
# =============================================================================
# Shared inventory for all molecule scenarios
# Primary: Podman containers with systemd support (Fedora Rawhide)
# Secondary/Redundant: Docker containers (fallback)
# =============================================================================

all:
  vars:
    # Use TMPDIR environment variable or default to /tmp
    tmp_dir: "{{ lookup('env', 'TMPDIR') | default('/tmp') }}"
    # Test environment flag
    molecule_test_mode: true
    # Fedora Rawhide specific settings
    ansible_python_interpreter: /usr/bin/python3
    # Container runtime selection (primary: podman, secondary: docker)
    container_runtime_primary: podman
    container_runtime_secondary: docker

  children:
    # =========================================================================
    # PRIMARY: Podman Containers (Fedora Rawhide with systemd)
    # =========================================================================
    podman_containers:
      hosts:
        # Primary test container - Fedora Rawhide with systemd
        molecule-fedora-rawhide:
          ansible_connection: containers.podman.podman
          container_image: ghcr.io/ansible/community-ansible-dev-tools:latest
          container_command: /sbin/init
          container_privileged: false
          container_capabilities:
            - SYS_ADMIN
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          container_systemd: true
          # Test variables
          my_variable: molecule-fedora-rawhide
          attributes:
            color: blue
            size: medium
            shape: rectangle
          prerequisites:
            - python3
            - systemd
            - dnf5
          # Fedora Rawhide specific
          ansible_distribution: Fedora
          ansible_distribution_version: rawhide
          ansible_os_family: RedHat

        # Secondary podman container - CentOS Stream (redundancy)
        molecule-centos-stream:
          ansible_connection: containers.podman.podman
          container_image: quay.io/centos/centos:stream9
          container_command: /sbin/init
          container_privileged: false
          container_capabilities:
            - SYS_ADMIN
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          container_systemd: true
          # Test variables
          my_variable: molecule-centos-stream
          attributes:
            color: red
            size: large
            shape: circle
          prerequisites:
            - python3
            - systemd
            - dnf

      vars:
        # Common variables for all podman containers
        ansible_connection: containers.podman.podman
        # DNF5 is default on Fedora 41+
        ansible_pkg_mgr: dnf5
        # Test mode flags
        is_test_environment: true
        skip_production_checks: true
        # Container runtime
        container_runtime: podman

    # =========================================================================
    # SECONDARY: Docker Containers (Fallback/Redundancy)
    # =========================================================================
    docker_containers:
      hosts:
        # Fallback test container - Ubuntu with systemd
        molecule-ubuntu-systemd:
          ansible_connection: community.docker.docker
          container_image: ubuntu:22.04
          container_command: /sbin/init
          container_privileged: true
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          # Test variables
          my_variable: molecule-ubuntu-systemd
          attributes:
            color: green
            size: small
            shape: square
          prerequisites:
            - python3
            - systemd
          # Ubuntu specific
          ansible_distribution: Ubuntu
          ansible_distribution_version: "22.04"
          ansible_os_family: Debian

        # Additional docker container - Debian (redundancy)
        molecule-debian-systemd:
          ansible_connection: community.docker.docker
          container_image: debian:bookworm
          container_command: /sbin/init
          container_privileged: true
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          # Test variables
          my_variable: molecule-debian-systemd
          attributes:
            color: yellow
            size: medium
            shape: triangle
          prerequisites:
            - python3
            - systemd
          # Debian specific
          ansible_distribution: Debian
          ansible_distribution_version: "12"
          ansible_os_family: Debian

      vars:
        # Common variables for all docker containers
        ansible_connection: community.docker.docker
        # APT package manager
        ansible_pkg_mgr: apt
        # Test mode flags
        is_test_environment: true
        skip_production_checks: true
        # Container runtime
        container_runtime: docker

    # =========================================================================
    # ALL CONTAINERS GROUP (for testing all runtimes)
    # =========================================================================
    all_containers:
      children:
        - podman_containers
        - docker_containers
      vars:
        # Shared variables for all containers
        container_state: started
        container_auto_remove: false
        # Systemd compliance
        systemd_required: true
        # Testing flags
        molecule_scenario: true

---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# Molecule Test Inventory
# =============================================================================
# Shared inventory for all molecule scenarios
# Primary: Podman containers with systemd support (Fedora/Ultramarine)
# =============================================================================

all:
  vars:
    # Use TMPDIR environment variable or default to /tmp
    tmp_dir: "{{ lookup('env', 'TMPDIR') | default('/tmp') }}"
    # Test environment flag
    molecule_test_mode: true
    # Fedora/Ultramarine specific settings
    ansible_python_interpreter: /usr/bin/python3
    # Container runtime selection
    container_runtime_primary: podman

  children:
    # =========================================================================
    # PRIMARY: Podman Containers (Fedora Rawhide with systemd)
    # =========================================================================
    podman_containers:
      hosts:
        # Primary test container - Fedora Rawhide with systemd
        molecule-fedora-rawhide:
          ansible_connection: containers.podman.podman
          container_image: ghcr.io/ansible/community-ansible-dev-tools:latest
          container_command: /sbin/init
          container_privileged: false
          container_capabilities:
            - SYS_ADMIN
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          container_systemd: true
          # Test variables
          my_variable: molecule-fedora-rawhide
          attributes:
            color: blue
            size: medium
            shape: rectangle
          prerequisites:
            - python3
            - systemd
            - dnf5
          # Fedora Rawhide specific
          ansible_distribution: Fedora
          ansible_distribution_version: rawhide
          ansible_os_family: RedHat

        # Secondary podman container - CentOS Stream (redundancy)
        molecule-centos-stream:
          ansible_connection: containers.podman.podman
          container_image: quay.io/centos/centos:stream9
          container_command: /sbin/init
          container_privileged: false
          container_capabilities:
            - SYS_ADMIN
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:ro
          container_tmpfs:
            - /run
            - /tmp
          container_log_driver: json-file
          container_systemd: true
          # Test variables
          my_variable: molecule-centos-stream
          attributes:
            color: red
            size: large
            shape: circle
          prerequisites:
            - python3
            - systemd
            - dnf

      vars:
        # Common variables for all podman containers
        ansible_connection: containers.podman.podman
        # DNF5 is default on Fedora 41+
        ansible_pkg_mgr: dnf5
        # Test mode flags
        is_test_environment: true
        skip_production_checks: true
        # Container runtime
        container_runtime: podman

    # =========================================================================
    # ALL CONTAINERS GROUP (for testing all runtimes)
    # =========================================================================
    all_containers:
      children:
        - podman_containers
      vars:
        # Shared variables for all containers
        container_state: started
        container_auto_remove: false
        # Systemd compliance
        systemd_required: true
        # Testing flags
        molecule_scenario: true

---
# SPDX-License-Identifier: MIT-0
# =============================================================================
# Create Playbook - Initialize Testing Containers
# =============================================================================
# PRIMARY: Podman containers with systemd support
# SECONDARY: Docker containers (fallback/redundancy)
# Creates containers from inventory definitions with systemd compliance
# =============================================================================

- name: Create container instances - Primary Podman
  hosts: localhost
  gather_facts: false
  vars:
    molecule_inventory:
      all:
        hosts: {}
        molecule: {}
  tasks:
    - name: Validate podman group exists
      ansible.builtin.assert:
        that:
          - groups['podman_containers'] is defined
        fail_msg: "podman_containers group not found in inventory"

    - name: Create Podman containers from inventory
      containers.podman.podman_container:
        hostname: "{{ item }}"
        name: "{{ item }}"
        image: "{{ hostvars[item]['container_image'] }}"
        command: "{{ hostvars[item]['container_command'] | default('/sbin/init') }}"
        privileged: "{{ hostvars[item]['container_privileged'] | default(false) }}"
        capabilities: "{{ hostvars[item]['container_capabilities'] | default(omit) }}"
        volumes: "{{ hostvars[item]['container_volumes'] | default(omit) }}"
        tmpfs: "{{ hostvars[item]['container_tmpfs'] | default(omit) }}"
        systemd: "{{ hostvars[item]['container_systemd'] | default(true) }}"
        log_driver: "{{ hostvars[item]['container_log_driver'] | default('json-file') }}"
        state: started
        auto_remove: "{{ container_auto_remove | default(false) }}"
      register: podman_result
      loop: "{{ groups['podman_containers'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: groups['podman_containers'] is defined

    - name: Verify Podman containers are running
      ansible.builtin.include_tasks:
        file: tasks/create-fail.yml
      vars:
        container_runtime: podman
      when: >
        item.container.State.ExitCode != 0 or
        not item.container.State.Running
      loop: "{{ podman_result.results | default([]) }}"
      loop_control:
        label: "{{ item.container.Name }}"

    - name: Display Podman container info
      ansible.builtin.debug:
        msg: >-
          Created Podman container: {{ item.container.Name }}
          Image: {{ item.container.Config.Image }}
          State: {{ item.container.State.Status }}
          Running: {{ item.container.State.Running }}
      loop: "{{ podman_result.results | default([]) }}"
      loop_control:
        label: "{{ item.container.Name }}"

- name: Create container instances (Secondary: Docker)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate docker group exists
      ansible.builtin.assert:
        that:
          - groups['docker_containers'] is defined
        fail_msg: "docker_containers group not found in inventory"

    - name: Create Docker containers from inventory
      community.docker.docker_container:
        name: "{{ item }}"
        image: "{{ hostvars[item]['container_image'] }}"
        command: "{{ hostvars[item]['container_command'] | default('/sbin/init') }}"
        privileged: "{{ hostvars[item]['container_privileged'] | default(false) }}"
        capabilities: "{{ hostvars[item]['container_capabilities'] | default(omit) }}"
        volumes: "{{ hostvars[item]['container_volumes'] | default(omit) }}"
        tmpfs: "{{ hostvars[item]['container_tmpfs'] | default(omit) }}"
        log_driver: "{{ hostvars[item]['container_log_driver'] | default('json-file') }}"
        state: started
        auto_remove: "{{ container_auto_remove | default(false) }}"
        entrypoint: ""
      register: docker_result
      loop: "{{ groups['docker_containers'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: groups['docker_containers'] is defined

    - name: Verify Docker containers are running
      ansible.builtin.include_tasks:
        file: tasks/create-fail.yml
      vars:
        container_runtime: docker
      when: >
        item.container.State.ExitCode != 0 or
        not item.container.State.Running
      loop: "{{ docker_result.results | default([]) }}"
      loop_control:
        label: "{{ item.container.Name }}"

    - name: Display Docker container info
      ansible.builtin.debug:
        msg: >-
          Created Docker container: {{ item.container.Name }}
          Image: {{ item.container.Config.Image }}
          State: {{ item.container.State.Status }}
          Running: {{ item.container.State.Running }}
      loop: "{{ docker_result.results | default([]) }}"
      loop_control:
        label: "{{ item.container.Name }}"

- name: Wait for all containers to be ready
  hosts: all_containers
  gather_facts: false
  tasks:
    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        timeout: 300
      delegate_to: "{{ inventory_hostname }}"

    - name: Display container readiness
      ansible.builtin.debug:
        msg: "Container {{ inventory_hostname }} is ready"

- name: Verify container creation
  hosts: all_containers
  gather_facts: true
  tasks:
    - name: Display container system information
      ansible.builtin.debug:
        msg: >-
          Container: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Family: {{ ansible_os_family }}
          Python: {{ ansible_python_version | default('N/A') }}
          Connection: {{ ansible_connection }}

    - name: Verify systemd is available
      ansible.builtin.command:
        cmd: systemctl --version
      register: systemctl_version
      changed_when: false
      failed_when: false

    - name: Display systemd version
      ansible.builtin.debug:
        msg: "Systemd available: {{ systemctl_version.rc == 0 }}"
      when: systemctl_version.rc is defined
